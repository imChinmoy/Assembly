name: client
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http:
  google_fonts: 
  flutter_riverpod: 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: 

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/image.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
  fonts:
    - family: Hunters K-Pop
      fonts:
        - asset: assets/fonts/HuntersK-Pop.otf
        
